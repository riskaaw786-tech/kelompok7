<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Type Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            color: #ffffff;
            transition: background-color 0.2s ease;
            overflow: hidden;
        }

        /* Efek Bergetar (Shake Animation) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake {
            animation: shake 0.3s;
        }

        /* Mengubah background jadi hijau sekejap */
        .correct-flash {
            background-color: #27ae60 !important;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .score-board {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #f1c40f;
        }

        .word-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .input-field {
            width: 100%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            outline: none;
            text-align: center;
            background-color: #ecf0f1;
            color: #2c3e50;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .input-field:focus {
            box-shadow: 0 0 10px #3498db;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="game-container" id="gameContainer">
        <h1>SPEED TYPE</h1>
        <div class="score-board">Skor: <span id="score">0</span></div>
        <div class="word-display" id="wordDisplay">loading...</div>
        <input type="text" id="wordInput" class="input-field" placeholder="Ketik katanya di sini..." autofocus autocomplete="off">
        <p class="instructions">Tekan <strong>Enter</strong> atau <strong>Spasi</strong> setelah mengetik untuk mengecek.</p>
    </div>

    <script>
        // Daftar kata acak
        const words = [
            "javascript", "html", "css", "website", "coding", "program", 
            "keyboard", "kecepatan", "komputer", "belajar", "fokus", 
            "screen", "game", "mantap", "sukses", "developer", "browser"
        ];

        let score = 0;
        let currentWord = "";

        const wordDisplay = document.getElementById('wordDisplay');
        const wordInput = document.getElementById('wordInput');
        const scoreDisplay = document.getElementById('score');
        const gameContainer = document.getElementById('gameContainer');
        const body = document.body;

        // Fungsi untuk mengambil kata acak
        function getRandomWord() {
            const randomIndex = Math.floor(Math.random() * words.length);
            return words[randomIndex];
        }

        // Fungsi untuk memperbarui kata di layar
        function initWord() {
            currentWord = getRandomWord();
            wordDisplay.innerText = currentWord;
        }

        // Event listener saat pengguna mengetik dan menekan tombol
        wordInput.addEventListener('keydown', function(event) {
            // Cek jika pengguna menekan Enter (Keycode 13) atau Spasi (Keycode 32)
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault(); // Mencegah spasi masuk ke input setelah di-submit
                
                const userWord = wordInput.value.trim().toLowerCase();

                if (userWord === currentWord) {
                    // JIKA BENAR
                    score++;
                    scoreDisplay.innerText = score;
                    
                    // Efek hijau sekejap pada background body
                    body.classList.add('correct-flash');
                    setTimeout(() => {
                        body.classList.remove('correct-flash');
                    }, 200);

                    // Reset input dan ganti kata baru
                    wordInput.value = '';
                    initWord();
                } else {
                    // JIKA SALAH
                    // Efek bergetar pada container game
                    gameContainer.classList.add('shake');
                    setTimeout(() => {
                        gameContainer.classList.remove('shake');
                    }, 300);
                    
                    // Opsional: langsung kosongkan input jika salah agar bisa coba lagi cepat
                    wordInput.value = '';
                }
            }
        });

        // Memulai game pertama kali saat halaman dimuat
        initWord();
    </script>
</body>
</html>
